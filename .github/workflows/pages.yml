name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish dist to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd dist
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy GitHub Pages"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages

      - name: Enable Pages branch source
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/pages.json <<'JSON'
          {"source":{"branch":"gh-pages","path":"/"}}
          JSON
          gh api repos/${{ github.repository }}/pages --silent \
            && gh api --method PUT repos/${{ github.repository }}/pages --input /tmp/pages.json \
            || gh api --method POST repos/${{ github.repository }}/pages --input /tmp/pages.json
